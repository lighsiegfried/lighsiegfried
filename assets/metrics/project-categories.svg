<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" width="660" height="200" role="img" aria-label="Selected projects by category. Web / Full-stack: 4, AI / Automation: 1, Mobile: 1. Curated categories across the six selected repositories.">
