    <text x="168" y="72" text-anchor="end" font-size="13" fill="#CBD5E1"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">Web / Full-stack</text>
    <rect x="182" y="58" width="424" height="18" rx="5" fill="url(#accent)"/>
    <text x="614" y="72" font-size="12" font-weight="600" fill="#F8FAFC"
