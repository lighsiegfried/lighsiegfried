<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" width="660" height="200" role="img" aria-label="Selected projects by maturity. Active development: 3, Complete demo: 2, Earlier work: 1. Status cross-checked against each repo's last public push.">
  <title>Selected projects by maturity</title>
  <desc>Selected projects by maturity. Active development: 3, Complete demo: 2, Earlier work: 1. Status cross-checked against each repo's last public push.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="660" height="200" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="659" height="199" rx="15.5" fill="none" stroke="#334155" stroke-width="1"/>
  <rect x="24" y="24" width="6" height="20" rx="3" fill="url(#accent)"/>
  <text x="40" y="40" font-size="18" font-weight="700" fill="#F8FAFC"
    font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">Selected projects by maturity</text>
  
    <text x="168" y="72" text-anchor="end" font-size="13" fill="#CBD5E1"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">Active development</text>
    <rect x="182" y="58" width="424" height="18" rx="5" fill="url(#accent)"/>
    <text x="614" y="72" font-size="12" font-weight="600" fill="#F8FAFC"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">3</text>
    <text x="168" y="106" text-anchor="end" font-size="13" fill="#CBD5E1"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">Complete demo</text>
    <rect x="182" y="92" width="283" height="18" rx="5" fill="url(#accent)"/>
    <text x="473" y="106" font-size="12" font-weight="600" fill="#F8FAFC"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">2</text>
    <text x="168" y="140" text-anchor="end" font-size="13" fill="#CBD5E1"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">Earlier work</text>
    <rect x="182" y="126" width="141" height="18" rx="5" fill="url(#accent)"/>
    <text x="331" y="140" font-size="12" font-weight="600" fill="#F8FAFC"
      font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">1</text>
  <text x="24" y="184" font-size="11" fill="#94A3B8"
    font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">Status cross-checked against each repo's last public push.</text>
</svg>
